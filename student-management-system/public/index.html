<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🎓 Student Management System</div>
    <span class="nav-sub">College Mini Project</span>
  </nav>

  <div class="container">

    <!-- Dashboard Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">Total Students</span>
      </div>
    </div>

    <!-- Add / Edit Form -->
    <div class="card">
      <h2 id="formTitle">Add New Student</h2>
      <form id="studentForm">
        <input type="hidden" id="studentId" />
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter full name" required />
          </div>
          <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="rollNumber" placeholder="e.g. CS2024001" required />
          </div>
          <div class="form-group">
            <label>Department</label>
            <select id="department" required>
              <option value="">Select Department</option>
              <option>Computer Science</option>
              <option>Electronics</option>
              <option>Mechanical</option>
              <option>Civil</option>
              <option>Information Technology</option>
              <option>Electrical</option>
            </select>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="student@college.edu" required />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Student</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="resetForm()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Student Table -->
    <div class="card">
      <div class="table-header">
        <h2>All Students</h2>
        <input type="text" id="searchInput" placeholder="🔍 Search students..." oninput="filterStudents()" />
      </div>
      <div class="table-wrapper">
        <table id="studentTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Roll Number</th>
              <th>Department</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentBody">
            <tr><td colspan="6" class="empty-msg">No students found. Add one above!</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
